name: CI

permissions:
  contents: write

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  pack-and-smoke-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          $packageVersion = "${{ steps.tag.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($packageVersion)) {
            [xml]$projectXml = Get-Content .\QaaS.Mocker.Template.Package.csproj
            $packageVersion = $projectXml.Project.PropertyGroup.Version
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "packageVersion=$packageVersion"

      - name: Pack template
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\package | Out-Null
          dotnet pack .\QaaS.Mocker.Template.Package.csproj `
            --configuration $env:CONFIGURATION `
            -p:PackageVersion=${{ steps.version.outputs.packageVersion }} `
            --output .\artifacts\package
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet pack failed."
          }

      - name: Create mirror symbol package
        shell: pwsh
        run: |
          $package = Join-Path $PWD "artifacts\package\QaaS.Mocker.Template.${{ steps.version.outputs.packageVersion }}.nupkg"

          if (-not (Test-Path $package)) {
            throw "Template package was not created at $package."
          }

          $symbolPackagePath = [System.IO.Path]::ChangeExtension($package, ".snupkg")
          Copy-Item -Path $package -Destination $symbolPackagePath -Force

      - name: Smoke test template
        shell: pwsh
        run: |
          $generatedName = "Smoke.QaaS.Mocker"
          $runRoot = Join-Path $PWD "artifacts\smoke\$([Guid]::NewGuid().ToString('N'))"
          $generatedRoot = Join-Path $runRoot "generated"
          New-Item -ItemType Directory -Force -Path $runRoot | Out-Null

          $env:DOTNET_CLI_HOME = Join-Path $runRoot "cli-home"
          $env:NUGET_PACKAGES = Join-Path $runRoot "nuget-packages"
          $env:DOTNET_SKIP_FIRST_TIME_EXPERIENCE = "1"

          $package = Get-ChildItem .\artifacts\package\QaaS.Mocker.Template.*.nupkg |
            Where-Object { $_.Name -notlike "*.snupkg" } |
            Select-Object -First 1

          if ($null -eq $package) {
            throw "Template package was not created."
          }

          dotnet new install $package.FullName
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet new install failed."
          }

          dotnet new qaas-mocker -n $generatedName -o $generatedRoot
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet new qaas-mocker failed."
          }

          $solutionPath = Join-Path $generatedRoot "$generatedName.sln"
          $projectFile = Join-Path (Join-Path $generatedRoot $generatedName) "$generatedName.csproj"
          $nuGetConfig = Join-Path $generatedRoot "NuGet.config"
          $yamlPath = Join-Path (Join-Path $generatedRoot $generatedName) "mocker.qaas.yaml"
          $yamlRunPath = "mocker.qaas.yaml"

          dotnet restore $solutionPath --configfile $nuGetConfig
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet restore failed."
          }

          dotnet build $solutionPath -c $env:CONFIGURATION --no-restore
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet build failed."
          }

          Push-Location $generatedRoot
          try {
            $helpOutput = & dotnet run -c $env:CONFIGURATION --project $projectFile -- --help 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0) {
              throw "Mocker help execution failed.`n$helpOutput"
            }

            $previousErrorActionPreference = $ErrorActionPreference
            $ErrorActionPreference = "Continue"
            try {
              $defaultTemplateOutput = & dotnet run -c $env:CONFIGURATION --project $projectFile -- template $yamlRunPath 2>&1 | Out-String
              $defaultTemplateExitCode = $LASTEXITCODE
            }
            finally {
              $ErrorActionPreference = $previousErrorActionPreference
            }
          }
          finally {
            Pop-Location
          }

          if ($helpOutput -notmatch "Usage:" -or $helpOutput -notmatch "run") {
            throw "Mocker help output did not render the command options.`n$helpOutput"
          }

          if ($defaultTemplateExitCode -ne 0) {
            throw "Default mocker template rendering should succeed for the generated runnable health mock.`n$defaultTemplateOutput"
          }

          if ($defaultTemplateOutput -notmatch "Servers:" -or $defaultTemplateOutput -notmatch "/health") {
            throw "Default mocker template rendering did not include the expected server definition.`n$defaultTemplateOutput"
          }

          $stdoutLog = Join-Path $runRoot "mocker-run.stdout.log"
          $stderrLog = Join-Path $runRoot "mocker-run.stderr.log"
          $mockerProcess = Start-Process `
            -FilePath "dotnet" `
            -ArgumentList @("run", "-c", $env:CONFIGURATION, "--project", $projectFile, "--", "run", "mocker.qaas.yaml") `
            -WorkingDirectory $generatedRoot `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog `
            -PassThru

          try {
            $healthResponse = $null
            for ($attempt = 0; $attempt -lt 15; $attempt++) {
              Start-Sleep -Seconds 2

              if ($mockerProcess.HasExited) {
                $stdout = if (Test-Path $stdoutLog) { Get-Content -Raw $stdoutLog } else { "" }
                $stderr = if (Test-Path $stderrLog) { Get-Content -Raw $stderrLog } else { "" }
                throw "Generated mocker exited before serving /health.`nSTDOUT:`n$stdout`nSTDERR:`n$stderr"
              }

              try {
                $healthResponse = Invoke-WebRequest -Uri "http://127.0.0.1:8080/health" -UseBasicParsing -TimeoutSec 5
                break
              }
              catch {
                if ($attempt -eq 14) {
                  throw
                }
              }
            }

            if ($null -eq $healthResponse) {
              $stdout = if (Test-Path $stdoutLog) { Get-Content -Raw $stdoutLog } else { "" }
              $stderr = if (Test-Path $stderrLog) { Get-Content -Raw $stderrLog } else { "" }
              throw "Generated mocker never served the /health endpoint.`nSTDOUT:`n$stdout`nSTDERR:`n$stderr"
            }

            if ($healthResponse.StatusCode -ne 200) {
              throw "Generated mocker returned HTTP $($healthResponse.StatusCode) for /health."
            }

            if ($healthResponse.Content.Trim() -ne "healthy") {
              throw "Generated mocker returned an unexpected /health payload.`n$($healthResponse.Content)"
            }
          }
          finally {
            if ($null -ne $mockerProcess -and -not $mockerProcess.HasExited) {
              Stop-Process -Id $mockerProcess.Id -Force
              $mockerProcess.WaitForExit()
            }
          }

      - name: Upload package artifact
        if: steps.tag.outputs.tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: qaas-mocker-template-package
          path: |
            artifacts\package\QaaS.Mocker.Template.*.nupkg
            artifacts\package\QaaS.Mocker.Template.*.snupkg

      - name: Create GitHub release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts\package\QaaS.Mocker.Template.*.nupkg
            artifacts\package\QaaS.Mocker.Template.*.snupkg
          fail_on_unmatched_files: true
          generate_release_notes: true
