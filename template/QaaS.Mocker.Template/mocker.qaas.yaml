DataSources: []

Stubs:
  - Name: HealthStub
    Processor: StatusCodeTransactionProcessor
    ProcessorSpecificConfiguration:
      StatusCode: 200

Server:
  Type: Http
  Http:
    Port: 8080
    IsLocalhost: false
    Endpoints:
      - Path: /health
        Actions:
          - Name: HealthAction
            Method: Get
            TransactionStubName: HealthStub
