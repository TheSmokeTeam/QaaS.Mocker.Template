DataSources: []

Stubs:
  - Name: HealthStub
    Processor: QaaS.Framework.SDK.Hooks.BaseHooks.StatusCodeTransactionProcessor
    ProcessorSpecificConfiguration:
      StatusCode: 200

Servers:
  - Http:
      Port: 8080
      IsLocalhost: true
      Endpoints:
        - Path: /health
          Actions:
            - Name: HealthAction
              Method: Get
              TransactionStubName: HealthStub
