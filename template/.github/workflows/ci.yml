name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build-lint-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QaaS.Mocker.Template.sln --configfile NuGet.config

      - name: Build
        run: dotnet build QaaS.Mocker.Template.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Lint mocker config
        shell: bash
        run: |
          cd QaaS.Mocker.Template
          dotnet run -c "${{ env.CONFIGURATION }}" --no-build -- -m Lint mocker.qaas.yaml

      - name: Build Docker image
        run: docker build -t qaas-mocker-template .
