name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  QAAS_NUGET_SOURCE_URL: ${{ vars.QAAS_NUGET_SOURCE_URL || 'https://api.nuget.org/v3/index.json' }}
  DOTNET_SDK_IMAGE: ${{ vars.DOTNET_SDK_IMAGE || 'mcr.microsoft.com/dotnet/sdk:10.0' }}
  DOTNET_RUNTIME_IMAGE: ${{ vars.DOTNET_RUNTIME_IMAGE || 'mcr.microsoft.com/dotnet/runtime:10.0' }}

jobs:
  build-lint-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore QaaS.Mocker.Template.sln --configfile NuGet.config --source "${QAAS_NUGET_SOURCE_URL}"

      - name: Build
        run: dotnet build QaaS.Mocker.Template.sln -c ${{ env.CONFIGURATION }} --no-restore

      - name: Lint mocker config
        shell: bash
        run: |
          if grep -Eq '^Servers:\s*\[\]\s*$' QaaS.Mocker.Template/mocker.qaas.yaml; then
            echo "Default empty mocker config detected; skipping lint until a server is added."
            exit 0
          fi
          cd QaaS.Mocker.Template
          dotnet run -c "${{ env.CONFIGURATION }}" --no-build -- -m Lint mocker.qaas.yaml

      - name: Build Docker image
        run: |
          docker build -t qaas-mocker-template \
            --build-arg DOTNET_SDK_IMAGE="${DOTNET_SDK_IMAGE}" \
            --build-arg DOTNET_RUNTIME_IMAGE="${DOTNET_RUNTIME_IMAGE}" \
            --build-arg QAAS_NUGET_SOURCE_URL="${QAAS_NUGET_SOURCE_URL}" \
            .
